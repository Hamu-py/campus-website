<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化祭 Webサイト</title>
  <!-- スタイルシート -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========================================
       Header
       サイト名・メインナビ
       ======================================== -->
  <header class="site-header" id="header">
    <div class="container header-inner">
      <!-- サイト名クリックでトップへ -->
      <h1 class="site-title"><a href="index.html">文化祭</a></h1>

      <!--
        【ナビの書き方】
        ・下の <li> をコピーするとメニューを増やせます
        ・href には開きたいページのファイル名を書きます
        ・例: href="pages/events.html" → 企画一覧ページへ移動
      -->
      <nav class="site-nav" aria-label="メインメニュー">
        <ul class="nav-list">
          <li><a href="index.html">トップ</a></li>
          <li><a href="pages/events.html">企画一覧</a></li>
          <li><a href="pages/timetable.html">タイムスケジュール</a></li>
          <!-- メニューを増やす例（コメントを外して使ってください）
          <li><a href="#news">お知らせ</a></li>
          <li><a href="#about">概要</a></li>
          <li><a href="#access">アクセス</a></li>
          <li><a href="#faq">FAQ</a></li>
          -->
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- ========================================
         Hero
         トップのメインビジュアル・キャッチコピー用
         ======================================== -->
    <section class="section hero" id="hero" aria-labelledby="hero-heading">
      <div class="container">
        <h2 id="hero-heading">Hero</h2>
        <p>ようこそ、文化祭へ。ここはメインビジュアルとキャッチコピーを置くセクションです。</p>
      </div>
    </section>

    <!-- ========================================
         News
         お知らせ・更新情報一覧用
         ======================================== -->
    <section class="section news" id="news" aria-labelledby="news-heading">
      <div class="container">
        <h2 id="news-heading">News</h2>
        <p>最新のお知らせを掲載する予定です。開催情報や変更点などをここにまとめます。</p>
      </div>
    </section>

    <!-- ========================================
         About
         文化祭の概要・テーマ紹介用
         ======================================== -->
    <section class="section about" id="about" aria-labelledby="about-heading">
      <div class="container">
        <h2 id="about-heading">About</h2>
        <p>文化祭のテーマや概要を紹介するセクションです。開催趣旨などをここに書きます。</p>
      </div>
    </section>

    <!-- ========================================
         Access
         会場アクセス・地図用
         ======================================== -->
    <section class="section access" id="access" aria-labelledby="access-heading">
      <div class="container">
        <h2 id="access-heading">Access</h2>
        <p>会場への行き方や地図を掲載する予定です。最寄り駅や注意事項もここにまとめます。</p>
      </div>
    </section>

    <!-- ========================================
         FAQ
         よくある質問用
         ======================================== -->
    <section class="section faq" id="faq" aria-labelledby="faq-heading">
      <div class="container">
        <h2 id="faq-heading">FAQ</h2>
        <p>来場者からのよくある質問と回答をまとめる予定です。開閉式のアコーディオンなども検討します。</p>
      </div>
    </section>

  </main>

  <!-- ========================================
       Footer
       コピーライト・リンクなど共通フッター
       ======================================== -->
  <footer class="site-footer" id="footer">
    <div class="container">
      <p>&copy; 文化祭実行委員会</p>
      <!-- フッターリンクは今後追加予定 -->
    </div>
  </footer>

  <!-- JavaScript（処理は今後追加） -->
  <script src="js/script.js"></script>
</body>
</html>
