<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企画一覧 | 日暮里キャンパスフェスティバル</title>
  <!--
    【パスについて】
    このファイルは pages/ フォルダの中にあるので、
    CSS や JS、トップページへのリンクは「ひとつ上」を指す ../ を付けます。
    例: ../css/style.css  →  フォルダを1つ上がって css/style.css を読む
  -->
  <!-- フォント（Google Fonts） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- ========================================
       Header（各ページ共通のナビ）
       ======================================== -->
  <header class="site-header" id="header">
    <div class="container header-inner">
      <h1 class="site-title"><a href="../index.html">日暮里キャンパスフェスティバル</a></h1>

      <!--
        【ナビの書き方】
        ・pages/ 内のページ同士は「ファイル名だけ」でOK（例: timetable.html）
        ・トップへ戻るときは ../index.html
      -->
      <nav class="site-nav" aria-label="メインメニュー">
        <ul class="nav-list">
          <li>
            <a href="../index.html">
              <span class="material-symbols-outlined" aria-hidden="true">home</span>
              トップ
            </a>
          </li>
          <li>
            <a href="events.html" aria-current="page">
              <span class="material-symbols-outlined" aria-hidden="true">event</span>
              企画一覧
            </a>
          </li>
          <li>
            <a href="timetable.html">
              <span class="material-symbols-outlined" aria-hidden="true">schedule</span>
              タイムスケジュール
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- ========================================
         企画一覧ページ
         このページの内容を編集すれば一覧が更新されます
         ======================================== -->
    <section class="section events" id="events" aria-labelledby="events-heading">
      <div class="container">
        <h2 id="events-heading">企画一覧</h2>
        <p>文化祭で行われる企画の一覧です。気になる企画を探してみてください。</p>

        <!--
          ========================================
          【企画一覧の書き方（ここを編集）】
          ========================================
          1. 下の「企画カード」1つ分（<li>...</li>）をコピーする
          2. コピーしたブロックを </ul> の手前に貼り付ける
          3. 中の文字だけ書き換える

          書き換え項目の意味:
          ・企画名 …… 例: 3年A組カフェ
          ・カテゴリ …… 例: 模擬店 / 展示 / ステージ / 体験
          ・場所 …… 例: 体育館 / 1年A組教室 / 中庭
          ・紹介文 …… 1〜2行で企画の説明

          ヒント:
          ・不要な企画カードは、その <li>...</li> ごと削除してOK
          ・サンプルのまま残しても、あとから差し替えできます
          ========================================
        -->
        <ul class="event-list">

          <li>
            <a class="event-card-link" href="events/kaikaisiki.html"><article class="event-card">
              <img class="event-card-image" src="../images/kaikaisiki.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">開会式</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/heikaisiki.html"><article class="event-card">
              <img class="event-card-image" src="../images/heikaisiki.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">閉会式</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/satueisupotto.html"><article class="event-card">
              <img class="event-card-image" src="../images/satueisupotto.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">撮影スポット</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/kahoot.html"><article class="event-card">
              <img class="event-card-image" src="../images/kahoot.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">Kahoot!</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/bingo.html"><article class="event-card">
              <img class="event-card-image" src="../images/BINGO.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">BINGO</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/game.html"><article class="event-card">
              <img class="event-card-image" src="../images/game.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">ゲーム大会</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/vr.html"><article class="event-card">
              <img class="event-card-image" src="../images/VR.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">VR</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/food_3.html"><article class="event-card">
              <img class="event-card-image" src="../images/food_3.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">飲食（週3）</h3>
              </div>
            </article></a>
          </li>

          <li>
            <a class="event-card-link" href="events/food_1.html"><article class="event-card">
              <img class="event-card-image" src="../images/food_1.jpg" alt="" aria-hidden="true">
              <div class="event-card-body">
                <h3 class="event-name">飲食（週1）</h3>
              </div>
            </article></a>
          </li>

        </ul>
      </div>
    </section>

  </main>

  <footer class="site-footer" id="footer">
    <div class="container">
    </div>
  </footer>

  <script src="../js/script.js"></script>
</body>
</html>
