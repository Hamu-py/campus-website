<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企画一覧 | 文化祭</title>
  <!--
    【パスについて】
    このファイルは pages/ フォルダの中にあるので、
    CSS や JS、トップページへのリンクは「ひとつ上」を指す ../ を付けます。
    例: ../css/style.css  →  フォルダを1つ上がって css/style.css を読む
  -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- ========================================
       Header（各ページ共通のナビ）
       ======================================== -->
  <header class="site-header" id="header">
    <div class="container header-inner">
      <h1 class="site-title"><a href="../index.html">文化祭</a></h1>

      <!--
        【ナビの書き方】
        ・pages/ 内のページ同士は「ファイル名だけ」でOK（例: timetable.html）
        ・トップへ戻るときは ../index.html
      -->
      <nav class="site-nav" aria-label="メインメニュー">
        <ul class="nav-list">
          <li><a href="../index.html">トップ</a></li>
          <li><a href="events.html" aria-current="page">企画一覧</a></li>
          <li><a href="timetable.html">タイムスケジュール</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- ========================================
         企画一覧ページ
         このページの内容を編集すれば一覧が更新されます
         ======================================== -->
    <section class="section events" id="events" aria-labelledby="events-heading">
      <div class="container">
        <h2 id="events-heading">企画一覧</h2>
        <p>文化祭で行われる企画の一覧です。気になる企画を探してみてください。</p>

        <!--
          ========================================
          【企画一覧の書き方（ここを編集）】
          ========================================
          1. 下の「企画カード」1つ分（<li>...</li>）をコピーする
          2. コピーしたブロックを </ul> の手前に貼り付ける
          3. 中の文字だけ書き換える

          書き換え項目の意味:
          ・企画名 …… 例: 3年A組カフェ
          ・カテゴリ …… 例: 模擬店 / 展示 / ステージ / 体験
          ・場所 …… 例: 体育館 / 1年A組教室 / 中庭
          ・紹介文 …… 1〜2行で企画の説明

          ヒント:
          ・不要な企画カードは、その <li>...</li> ごと削除してOK
          ・サンプルのまま残しても、あとから差し替えできます
          ========================================
        -->
        <ul class="event-list">

          <!-- ▼ 企画カード（この塊をコピーして増やしてください） -->
          <li>
            <article class="event-card">
              <h3 class="event-name">企画名をここに書く</h3>
              <p class="event-meta">
                <span class="event-category">カテゴリ</span>
                <span class="event-place">場所</span>
              </p>
              <p class="event-desc">企画の紹介文をここに書きます。どんな内容か、ひとことで説明しましょう。</p>
            </article>
          </li>
          <!-- ▲ 企画カードここまで -->

          <!-- ▼ サンプル2（不要ならこの <li>...</li> ごと消してください） -->
          <li>
            <article class="event-card">
              <h3 class="event-name">例）合唱部コンサート</h3>
              <p class="event-meta">
                <span class="event-category">ステージ</span>
                <span class="event-place">体育館</span>
              </p>
              <p class="event-desc">人気曲を中心に披露します。開演時刻はタイムスケジュールをご確認ください。</p>
            </article>
          </li>
          <!-- ▲ サンプル2ここまで -->

        </ul>
      </div>
    </section>

  </main>

  <footer class="site-footer" id="footer">
    <div class="container">
      <p>&copy; 文化祭実行委員会</p>
    </div>
  </footer>

  <script src="../js/script.js"></script>
</body>
</html>
